name: CI - Tests & Quality

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  test-lobby:
    name: Test Lobby Service
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/lobby/package-lock.json
      
      - name: Install dependencies
        working-directory: services/lobby
        run: npm ci
      
      - name: Run tests
        working-directory: services/lobby
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: npm test
      
      - name: Security audit
        working-directory: services/lobby
        run: npm audit --audit-level=high
        continue-on-error: true

  test-game:
    name: Test Game Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/game/package-lock.json
      
      - name: Install dependencies
        working-directory: services/game
        run: npm ci
      
      - name: Run tests
        working-directory: services/game
        run: npm test
      
      - name: Security audit
        working-directory: services/game
        run: npm audit --audit-level=high
        continue-on-error: true

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Lobby image
        uses: docker/build-push-action@v5
        with:
          context: services/lobby
          push: false
          tags: nexusplay-lobby:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build Game image
        uses: docker/build-push-action@v5
        with:
          context: services/game
          push: false
          tags: nexusplay-game:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
