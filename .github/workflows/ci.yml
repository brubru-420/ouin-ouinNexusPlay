name: CI - Tests & Quality

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test-lobby:
    name: Test Lobby Service
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: services/lobby
        run: npm install
      
      - name: Run tests
        working-directory: services/lobby
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: npm test
      
      - name: Security audit
        working-directory: services/lobby
        run: npm audit --audit-level=high
        continue-on-error: true

  test-game:
    name: Test Game Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: services/game
        run: npm install
      
      - name: Run tests
        working-directory: services/game
        run: npm test
      
      - name: Security audit
        working-directory: services/game
        run: npm audit --audit-level=high
        continue-on-error: true

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Lobby image
        uses: docker/build-push-action@v5
        with:
          context: services/lobby
          push: false
          tags: nexusplay-lobby:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build Game image
        uses: docker/build-push-action@v5
        with:
          context: services/game
          push: false
          tags: nexusplay-game:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-test:
    name: Integration Test (stack complète)
    runs-on: ubuntu-latest
    needs: [test-lobby, test-game]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build et démarrer la stack
        run: docker compose up -d --build
      
      - name: Attendre que les services soient prêts
        run: |
          echo "Attente du démarrage des services..."
          for i in {1..30}; do
            if curl -sf http://localhost:3000/health && curl -sf http://localhost:3001/health; then
              echo "✓ Services prêts"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Services pas prêts après 60s"
          docker compose logs
          exit 1
      
      - name: Test fonctionnel - création de lobby
        run: |
          response=$(curl -sf -X POST http://localhost:3000/lobbies \
            -H "Content-Type: application/json" \
            -d '{"name":"CI Test","gameType":"chess","maxPlayers":4}')
          echo "Réponse: $response"
          echo "$response" | grep -q "lobbyId" || exit 1
      
      - name: Test fonctionnel - liste des lobbies
        run: |
          response=$(curl -sf http://localhost:3000/lobbies)
          echo "Réponse: $response"
          echo "$response" | grep -q "count" || exit 1
      
      - name: Cleanup
        if: always()
        run: docker compose down -v
